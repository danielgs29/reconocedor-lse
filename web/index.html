<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reconocedor de Lengua de Signos Española</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0; padding: 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      background: #0f1115; color: #e8eaed;
    }
    h1 { font-size: 1.25rem; font-weight: 600; text-align: center; margin: 0.4rem 0; }
    #pestanas { display: flex; gap: 0.5rem; }
    #pestanas button {
      font-size: 1rem; padding: 0.5rem 1.2rem; border: none; border-radius: 999px;
      background: #23262e; color: #9aa0a6; cursor: pointer; font-weight: 600;
    }
    #pestanas button.activa { background: #5b8def; color: #fff; }
    #contenedor {
      position: relative; width: 100%; max-width: 560px; aspect-ratio: 4 / 3;
      border-radius: 12px; overflow: hidden; background: #000;
    }
    #video { display: none; }
    #lienzo { width: 100%; height: 100%; display: block; }
    #estado { font-size: 0.95rem; text-align: center; min-height: 1.4rem; color: #9aa0a6; }
    .panel { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; width: 100%; max-width: 560px; }
    .oculto { display: none; }
    select { font-size: 1rem; padding: 0.4rem; border-radius: 8px; }
    button.accion {
      font-size: 1.05rem; padding: 0.7rem 1.4rem; border-radius: 999px; border: none;
      background: #5b8def; color: #fff; cursor: pointer; font-weight: 600;
    }
    button.accion:disabled { opacity: 0.5; cursor: default; }
    button.secundario { background: #23262e; color: #e8eaed; }
    #referencia { width: 100%; border-radius: 12px; background: #000; aspect-ratio: 4/3; }
    #resultado-aprender { font-size: 1.5rem; font-weight: 700; min-height: 2rem; text-align: center; }
    #mensaje {
      width: 100%; min-height: 3rem; padding: 0.8rem; border-radius: 10px;
      background: #1a1d24; font-size: 1.4rem; font-weight: 600; text-align: center;
    }
    .aviso { text-align: center; color: #9aa0a6; font-size: 0.85rem; margin: 0; }
    label { color: #9aa0a6; }
  </style>
</head>
<body>
  <h1>Reconocedor de Lengua de Signos Española</h1>

  <div id="pestanas">
    <button id="tab-aprender" class="activa">Aprender</button>
    <button id="tab-comunicar">Comunicar</button>
  </div>

  <!-- Cámara, compartida por los dos modos -->
  <div id="contenedor">
    <video id="video" playsinline></video>
    <canvas id="lienzo" width="640" height="480"></canvas>
  </div>
  <div id="estado">Cargando…</div>

  <!-- MODO APRENDER -->
  <div id="panel-aprender" class="panel">
    <div>
      <label for="selector">Signo a practicar:</label>
      <select id="selector"></select>
    </div>
    <div style="width:100%;">
      <div style="font-size:0.85rem; color:#9aa0a6; margin-bottom:0.3rem; text-align:center;">Cómo se hace</div>
      <video id="referencia" playsinline muted loop autoplay></video>
    </div>
    <button id="grabar-aprender" class="accion" disabled>Grabar signo</button>
    <div id="resultado-aprender"></div>
    <p class="aviso">Elige un signo, míralo e imítalo frente a la cámara. La aplicación te dirá si lo has hecho bien.</p>
  </div>

  <!-- MODO COMUNICAR -->
  <div id="panel-comunicar" class="panel oculto">
    <div>
      <label for="idioma">Mostrar significado en:</label>
      <select id="idioma">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>
    <div style="display:flex; gap:0.6rem;">
      <button id="grabar-comunicar" class="accion" disabled>Signar</button>
      <button id="borrar" class="accion secundario">Borrar</button>
    </div>
    <div id="mensaje"></div>
    <p class="aviso">Signa en LSE. Cada signo reconocido se añade al texto, en el idioma elegido, para que quien no sepa signar pueda leerte.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
